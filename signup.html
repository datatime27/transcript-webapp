<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskmaster Transcription Annotation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 22px; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 28px 32px;
      width: 95%;
    }

    h1 {
      font-size: 1.2rem;
      color: #fff;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a2a;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    label {
      font-size: 0.8rem;
      color: #fff;
      font-weight: 700;
    }

    .label-note {
      color: #aaa;
      font-weight: 400;
    }

    input[type="text"],
    input[type="email"] {
      padding: 8px 12px;
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 5px;
      font-size: 0.9rem;
      width: 100%;
    }

    input:focus {
      outline: none;
      border-color: #666;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: #ccc;
      cursor: pointer;
      margin-bottom: 14px;
    }
    .checkbox-row input { width: auto; }

    .btn {
      width: 100%;
      padding: 10px 22px;
      background: #aa0000;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 6px;
    }
    .btn:hover    { background: #cc0000; }
    .btn:disabled { background: #555; cursor: default; }

    .intro {
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 0.88rem;
      color: #fff;
      line-height: 1.55;
    }

    .sign-off {
      color: #e0e0e0;
      font-weight: 500;
    }

    .result {
      margin-top: 14px;
      font-size: 0.85rem;
      padding: 8px 12px;
      border-radius: 5px;
      display: none;
    }
    .result.success { background: #0e2e0e; color: #4a8; border: 1px solid #2a5a2a; }
    .result.error   { background: #2e0e0e; color: #f88; border: 1px solid #5a2a2a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Taskmaster Transcription Volunteering</h1>
    <div class="intro">
      <p>Thank you for your interest in helping with the Taskmaster transcription annotation project. </p>
	  <p>Please fill out the information below and I will get back to you with instructions on how to access the app.</p>
	  <p>Your time starts now!</p>
      <p class="sign-off">&#x2013;Peter</p>
    </div>
    <div class="form-row">
      <label for="email">Email <span style="color:#f88">*</span></label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-row">
      <label for="name">Name <span style="color:#f88">*</span>
        <div class="label-note">What is your name? I will use this name to communicate with you and credit you. Or you can remain anonymous in the credits</div>
      </label>
      <input type="text" id="name" placeholder="Alex Horne" />
    </div>
    <label class="checkbox-row">
      <input type="checkbox" id="is-anonymous" onchange="toggleAnonymous()" /> Remain anonymous in the credits
    </label>
    <div class="form-row">
      <label for="location">Country
	  <div class="label-note">Taskmaster restricts which episodes are available in which countries.</div>
	  </label>
      <input type="text" id="location" placeholder="e.g. UK, US, AU, NZ" />
    </div>
    <button class="btn" id="submit-btn" onclick="signUp()">Sign Up</button>
    <div class="result" id="result"></div>
  </div>

<script>
  async function signUp() {
    const email       = document.getElementById('email').value.trim();
    const name        = document.getElementById('name').value.trim();
    const isAnonymous = document.getElementById('is-anonymous').checked;
    const location    = document.getElementById('location').value.trim();

    if (!email) { showResult(false, 'Email is required.'); return; }
    if (!name)  { showResult(false, 'Name is required.'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled    = true;
    btn.textContent = 'Signing up…';
    clearResult();

    try {
      const res  = await fetch('./signup.py', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          email,
          name:         isAnonymous ? 'Anonymous' : name,
          is_anonymous: isAnonymous || null,
          location:     location || null,
        }),
      });
      const data = await res.json();
      if (res.ok) {
        showResult(true, 'Account created! You will receive an email shortly with instructions.');
        document.getElementById('email').value          = '';
        document.getElementById('name').value           = '';
        document.getElementById('location').value       = '';
        document.getElementById('is-anonymous').checked = false;
      } else {
        showResult(false, data.error || 'Sign-up failed.');
      }
    } catch (e) {
      showResult(false, 'Network error — please try again.');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Sign Up';
    }
  }

  function clearResult() {
    const el = document.getElementById('result');
    el.style.display = 'none';
    el.textContent   = '';
  }

  function showResult(success, msg) {
    const el = document.getElementById('result');
    el.className     = `result ${success ? 'success' : 'error'}`;
    el.textContent   = msg;
    el.style.display = 'block';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') signUp();
  });
</script>
</body>
</html>
