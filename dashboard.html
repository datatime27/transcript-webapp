<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskmaster Annotation Progress</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      padding: 32px 24px;
    }

    h1 { font-size: 1.4rem; color: #fff; margin-bottom: 12px; text-align: center; }

    a { color: cyan; }

    .subtitle {
      font-size: 0.85rem;
      color: #fff;
      text-align: center;
      margin-bottom: 12px;
    }


    #load-error { color: #f88; font-size: 0.9rem; margin-bottom: 16px; }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      margin-bottom: 12px;
      padding: 12px 16px;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      font-size: 0.72rem;
      color: #fff;
    }

    .legend-section {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
    }

    .legend-section + .legend-section {
      padding-left: 16px;
      border-left: 1px solid #2a2a2a;
    }

    .legend-item { display: flex; align-items: center; gap: 6px; flex: 1 0 130px; }

    .legend-tile { width: 13px; height: 13px; border-radius: 3px; }

    /* Show groups */
    .shows-layout {
      display: flex;
      flex-wrap: wrap;
      gap: 0 48px;
      align-items: flex-start;
    }

    .shows-right {
      display: flex;
      flex-direction: column;
    }

    .show-group { margin-bottom: 32px; }

    @media (max-width: 600px) {
      body { padding: 20px 16px; }
      .shows-layout { gap: 0; }
    }

    @media (max-width: 380px) {
      .ep-tile { width: 18px; height: 18px; }
      .episode-grid { gap: 2px; }
      .season-label { width: 22px; }
    }

    .show-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
      padding-bottom: 7px;
      border-bottom: 1px solid #2a2a2a;
    }

    /* Season rows */
    .season-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .season-label {
      font-size: 0.65rem;
      width: 26px;
      text-align: right;
      flex-shrink: 0;
    }

    .season-stats {
      font-size: 0.65rem;
      white-space: nowrap;
      min-width: 32px;
    }

    /* Episode grid */
    .episode-grid {
      display: flex;
      gap: 3px;
    }

    .ep-tile {
      width: 25px;
      height: 25px;
      border-radius: 4px;
      border: 1px solid transparent;
      cursor: default;
      transition: filter 0.1s;
      user-select: none;
      flex-shrink: 0;
    }

    .ep-tile:hover { filter: brightness(1.4); }

    /* Tile status backgrounds */
    .ep-missing { background: #333333; }
    .ep-empty   { background: #777777; }
    .ep-red     { background: #ff0000; }
    .ep-yellow  { background: #ffff00; }
    .ep-orange  { background: #ff9b00; }
    .ep-green   { background: #00ff00; }

    .season-row.complete .season-label,
    .season-row.complete .season-stats { color: #98ffc0; }

    /* Progress bar */
    .progress-section {
      margin-bottom: 16px;
      padding: 12px 16px;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .progress-label { font-weight: 700; color: #fff; font-size: 1.4rem; }

    .progress-count { color: #fff; font-size: 0.78rem; }

    .progress-track {
      height: 12px;
      background: #2a2a2a;
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #00e060;
      border-radius: 6px;
      transition: width 0.5s ease;
      min-width: 0;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      background: #1c1c1c;
      border: 1px solid #363636;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 0.72rem;
      max-width: 230px;
      display: none;
      box-shadow: 0 4px 18px rgba(0,0,0,0.65);
    }

    .tt-title {
      font-weight: 600;
      color: #fff;
      font-size: 0.78rem;
      margin-bottom: 7px;
    }

    .tt-row { margin-bottom: 3px; }

    .tt-empty { color: #ffffff; font-style: italic; }

    /* Chart */
    .chart-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #fff;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h1>Taskmaster Annotation Progress</h1>
  <p class="subtitle">Here is the progress the volunteers have made annotating transcripts. If you'd like to volunteer sign up here: <a href="./signup.html">I want to volunteer!</a></p>
  <div id="load-error"></div>

  <div id="progress-container"></div>
  <div id="chart-container"></div>

  <div class="legend">
    <div class="legend-section">
      <div class="legend-item"><div class="legend-tile ep-missing"></div> Not downloaded</div>
      <div class="legend-item"><div class="legend-tile ep-empty"></div> No users assigned</div>
      <div class="legend-item"><div class="legend-tile ep-red"></div> None started</div>
      <div class="legend-item"><div class="legend-tile ep-yellow"></div> In progress</div>
      <div class="legend-item"><div class="legend-tile ep-orange"></div> Partially complete</div>
      <div class="legend-item"><div class="legend-tile ep-green"></div> Complete</div>
    </div>
  </div>

  <div id="content"><p style="color:#555">Loading…</p></div>

  <div id="tooltip">
    <div class="tt-title" id="tt-title"></div>
    <div id="tt-body"></div>
  </div>

<script>
  const SHOWS = [
    { name: 'Taskmaster UK', seasons: 21 },
    { name: 'Taskmaster AU', seasons: 4  },
    { name: 'Taskmaster NZ', seasons: 6  },
  ];
  const EPS_PER_SEASON = 10;

  loadData();

  async function loadData() {
    const res  = await fetch('./dashboard.py');
    const data = await res.json();
    if (!res.ok) {
      document.getElementById('load-error').textContent = data.error || 'Failed to load';
      return;
    }
    render(data.episodes);
    renderChart(data.history);
  }

  const episodeData = [];

  function tileStatus(ep) {
    if (ep.__missing)         return 'missing';
    if (!ep.user_count)       return 'empty';
    if (ep.has_merged || ep.complete_count >= 3) return 'green';
    if (ep.complete_count >= 1)                  return 'orange';
    if (ep.started_count  >= 1)                  return 'yellow';
    return 'red';
  }

  function renderTile(ep) {
    const idx = episodeData.length;
    episodeData.push(ep);
    return `<div class="ep-tile ep-${tileStatus(ep)}" data-idx="${idx}"
                 onmouseenter="showTooltip(event,this)"
                 onmousemove="moveTooltip(event)"
                 onmouseleave="hideTooltip()"></div>`;
  }

  function seasonStats(eps) {
    let total = 0, done = 0;
    for (const ep of eps) {
      if (ep.__missing || !ep.user_count) continue;
      total++;
      const s = tileStatus(ep);
      if (s === 'green') done++;
    }
    return { total, done };
  }

  function renderSeasonRow(season, eps, isComplete) {
    const { total, done } = seasonStats(eps);
    const stat = total ? `${done}/${total}` : '';
    return `<div class="season-row${isComplete ? ' complete' : ''}">
      <div class="season-label">S${season}</div>
      <div class="episode-grid">${eps.map(renderTile).join('')}</div>
      <div class="season-stats">${stat}</div>
    </div>`;
  }

  function renderShowGroup(showName, seasonRows) {
    return `<div class="show-group">
      <div class="show-name">${escHtml(showName)}</div>
      ${seasonRows.join('')}
    </div>`;
  }

  function renderProgressBar(allGridEps) {
    const total = allGridEps.length;
    let earned = 0, fullCount = 0, partCount = 0;
    for (const ep of allGridEps) {
      if (ep.__missing) continue;
      if (ep.has_merged || ep.complete_count >= 3) {
        earned += 1;
        fullCount++;
      } else if (ep.complete_count > 0) {
        earned += ep.complete_count / 3;
        partCount++;
      }
    }
    const pct      = total ? (earned / total * 100) : 0;
    const pctStr   = pct.toFixed(1);
    const earnedStr = earned.toFixed(1);

    document.getElementById('progress-container').innerHTML =
      `<div class="progress-section">
        <div class="progress-header">
          <span class="progress-label">Overall progress &nbsp;·&nbsp; ${pctStr}%</span>
          <span class="progress-count">${earnedStr} / ${total} episodes</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:0%"></div>
        </div>
      </div>`;

    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.querySelector('.progress-fill').style.width = pctStr + '%';
    }));
  }

  function render(dbEpisodes) {
    const dbMap = new Map();
    const seasonCompleteSet = new Set();
    for (const ep of dbEpisodes) {
      dbMap.set(`${ep.show_name}|${ep.season_number}|${ep.episode_number}`, ep);
      if (ep.season_complete) seasonCompleteSet.add(`${ep.show_name}|${ep.season_number}`);
    }

    const allGridEps = [];
    const showGroups = new Map();
    for (const show of SHOWS) {
      const rows = [];
      for (let s = 1; s <= show.seasons; s++) {
        const eps = [];
        for (let e = 1; e <= EPS_PER_SEASON; e++) {
          const ep = dbMap.get(`${show.name}|${s}|${e}`) || {
            __missing: true, show_name: show.name, season_number: s, episode_number: e,
          };
          eps.push(ep);
          allGridEps.push(ep);
        }
        rows.push(renderSeasonRow(s, eps, seasonCompleteSet.has(`${show.name}|${s}`)));
      }
      showGroups.set(show.name, rows);
    }

    const [firstName, ...restNames] = [...showGroups.keys()];
    const leftHtml  = renderShowGroup(firstName, showGroups.get(firstName));
    const rightHtml = restNames.map(n => renderShowGroup(n, showGroups.get(n))).join('');

    renderProgressBar(allGridEps);

    document.getElementById('content').innerHTML =
      `<div class="shows-layout">
        <div>${leftHtml}</div>
        <div class="shows-right">${rightHtml}</div>
      </div>`;
  }

  const tooltip = document.getElementById('tooltip');
  const ttTitle = document.getElementById('tt-title');
  const ttBody  = document.getElementById('tt-body');

  function showTooltip(e, el) {
    const ep = episodeData[parseInt(el.dataset.idx)];
    ttTitle.textContent = `${ep.show_name} S${ep.season_number} E${ep.episode_number}`;
    if (ep.__missing) {
      ttBody.innerHTML = '<div class="tt-empty">Not yet in database</div>';
    } else if (!ep.user_count) {
      ttBody.innerHTML = '<div class="tt-empty">No users assigned</div>';
    } else {
      const notStarted = ep.user_count - ep.started_count;
      const inProgress = ep.started_count - ep.complete_count;
      const lines = [];
      if (ep.complete_count) lines.push(`${ep.complete_count} complete`);
      if (inProgress > 0)    lines.push(`${inProgress} in progress`);
      if (notStarted > 0)    lines.push(`${notStarted} not started`);
      ttBody.innerHTML = lines.map(l => `<div class="tt-row">${escHtml(l)}</div>`).join('');
    }
    tooltip.style.display = 'block';
    positionTooltip(e);
  }

  function moveTooltip(e) { positionTooltip(e); }

  function positionTooltip(e) {
    const pad = 14;
    const tw  = tooltip.offsetWidth;
    const th  = tooltip.offsetHeight;
    let x = e.clientX + pad;
    let y = e.clientY + pad;
    if (x + tw > window.innerWidth  - 8) x = e.clientX - tw - pad;
    if (y + th > window.innerHeight - 8) y = e.clientY - th - pad;
    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
  }

  function hideTooltip() { tooltip.style.display = 'none'; }

  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // --- Time series chart ---

  let _chartPts = [], _chartHist = [], _chartVW = 560, _chartPadL = 44, _chartSegW = 1;

  function fmtChartDate(dateStr) {
    const [, m, d] = dateStr.split('-').map(Number);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[m-1]} ${d}`;
  }

  function niceStep(range) {
    if (range <= 0) return 1;
    const exp = Math.floor(Math.log10(range));
    const f   = Math.pow(10, exp);
    const n   = range / f;
    return (n < 1.5 ? 1 : n < 3 ? 2 : n < 7 ? 5 : 10) * f;
  }

  function renderChart(history) {
    const container = document.getElementById('chart-container');
    if (!history || history.length < 2 || !container) return;

    const W = 560, H = 110;
    const padL = 44, padR = 16, padT = 10, padB = 30;
    const cW = W - padL - padR, cH = H - padT - padB;

    const pcts  = history.map(h => h.pct);
    const minP  = Math.min(...pcts), maxP = Math.max(...pcts);
    const step  = niceStep((maxP - minP) || 1);
    const yMin  = Math.max(0,   Math.floor(minP / step) * step - step);
    const yMax  = Math.min(100, Math.ceil(maxP  / step) * step + step);
    const yRange = yMax - yMin;
    const prec  = step >= 1 ? 0 : step >= 0.1 ? 1 : 2;

    const xS = i => padL + (i / (history.length - 1)) * cW;
    const yS = p => padT + cH - ((p - yMin) / yRange) * cH;

    const pts = history.map((h, i) => [xS(i), yS(h.pct)]);
    _chartPts = pts; _chartHist = history;
    _chartVW = W; _chartPadL = padL; _chartSegW = cW / (history.length - 1);

    const linePath = 'M ' + pts.map(p => p.join(' ')).join(' L ');
    const areaPath = `${linePath} L ${pts[pts.length-1][0]} ${padT+cH} L ${padL} ${padT+cH} Z`;

    // Y-axis grid + labels
    let yTicksHtml = '';
    for (let p = yMin; p <= yMax + 0.001; p = Math.round((p + step) * 1e9) / 1e9) {
      const y = yS(p);
      yTicksHtml +=
        `<line x1="${padL}" y1="${y}" x2="${padL+cW}" y2="${y}" stroke="#777" stroke-width="1"/>` +
        `<text x="${padL-5}" y="${y+3.5}" text-anchor="end" fill="#fff" font-size="9">${p.toFixed(prec)}%</text>`;
    }

    // X-axis labels — 5 evenly-spaced
    const n = history.length;
    const showIdx = new Set([0,1,2,3].map(q => Math.round((n-1)*q/4)).concat([n-1]));
    let xLabelsHtml = '';
    history.forEach((h, i) => {
      if (!showIdx.has(i)) return;
      xLabelsHtml +=
        `<text x="${xS(i)}" y="${padT+cH+18}" text-anchor="middle" fill="#fff" font-size="9">${fmtChartDate(h.date)}</text>`;
    });

    // Dots
    const dotsHtml = pts.map(([px, py]) =>
      `<circle cx="${px}" cy="${py}" r="2.5" fill="#00e060" stroke="#141414" stroke-width="1.5"/>`
    ).join('');

    const svg =
      `<svg id="chart-svg" viewBox="0 0 ${W} ${H}" width="100%" style="display:block" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#00e060" stop-opacity="0.22"/>
            <stop offset="100%" stop-color="#00e060" stop-opacity="0.01"/>
          </linearGradient>
        </defs>
        ${yTicksHtml}
        <path d="${areaPath}" fill="url(#chartGrad)"/>
        <path d="${linePath}" fill="none" stroke="#00e060" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
        ${dotsHtml}
        ${xLabelsHtml}
        <line id="chart-hline" x1="0" y1="${padT}" x2="0" y2="${padT+cH}" stroke="#444" stroke-width="1" display="none"/>
        <circle id="chart-hdot" cx="0" cy="0" r="4.5" fill="#00e060" stroke="#fff" stroke-width="1.5" display="none"/>
        <rect id="chart-overlay" x="${padL}" y="${padT}" width="${cW}" height="${cH}" fill="transparent" style="cursor:crosshair"
          onmousemove="chartHover(event)" onmouseleave="chartLeave()"/>
      </svg>`;

    container.innerHTML =
      `<div class="progress-section" style="margin-bottom:16px">
        <div class="chart-label">28-day progress trend</div>
        ${svg}
      </div>`;
  }

  function chartHover(event) {
    const svg  = document.getElementById('chart-svg');
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const scaleX = _chartVW / rect.width;
    const mouseVX = (event.clientX - rect.left) * scaleX;
    const idx = Math.max(0, Math.min(_chartPts.length - 1, Math.round((mouseVX - _chartPadL) / _chartSegW)));

    const [px, py] = _chartPts[idx];
    const h = _chartHist[idx];

    const hline = document.getElementById('chart-hline');
    const hdot  = document.getElementById('chart-hdot');
    hline.setAttribute('x1', px); hline.setAttribute('x2', px); hline.removeAttribute('display');
    hdot.setAttribute('cx', px);  hdot.setAttribute('cy', py);  hdot.removeAttribute('display');

    document.getElementById('tt-title').textContent = fmtChartDate(h.date);
    document.getElementById('tt-body').innerHTML = `<div class="tt-row">${h.pct.toFixed(2)}% overall complete</div>`;
    const tt = document.getElementById('tooltip');
    tt.style.display = 'block';
    const pad = 14, tw = tt.offsetWidth, th = tt.offsetHeight;
    let x = event.clientX + pad, y = event.clientY + pad;
    if (x + tw > window.innerWidth  - 8) x = event.clientX - tw - pad;
    if (y + th > window.innerHeight - 8) y = event.clientY - th - pad;
    tt.style.left = x + 'px'; tt.style.top = y + 'px';
  }

  function chartLeave() {
    const hline = document.getElementById('chart-hline');
    const hdot  = document.getElementById('chart-hdot');
    if (hline) hline.setAttribute('display', 'none');
    if (hdot)  hdot.setAttribute('display', 'none');
    document.getElementById('tooltip').style.display = 'none';
  }
</script>
</body>
</html>
